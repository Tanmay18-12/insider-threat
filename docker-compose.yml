version: '3.8'

services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: threatdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/app/ml
    environment:
      - DATABASE_URL=postgresql://admin:secret@postgres:5432/threatdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-secret-key-change-in-prod
      - JWT_EXPIRE_MINUTES=30
      - RISK_THRESHOLD=75
      - ML_RETRAIN_HOURS=24
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 3000

  ml-worker:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - ./ml:/app/ml
    environment:
      - DATABASE_URL=postgresql://admin:secret@postgres:5432/threatdb
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: python /app/ml/baseline_builder.py

volumes:
  postgres_data:
